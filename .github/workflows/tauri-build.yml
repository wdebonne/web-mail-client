name: Tauri Build

on:
  workflow_dispatch:
    inputs:
      server_url:
        description: "URL du serveur WebMail (baked dans l'app)"
        required: true
        default: "http://localhost:3000"
      version:
        description: "Version de l'app"
        required: false
        default: "1.7.0"

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            platform: linux
            bundles: deb,appimage
          - os: windows-latest
            platform: windows
            bundles: msi,nsis
          - os: macos-latest
            platform: macos
            bundles: dmg

    runs-on: ${{ matrix.os }}
    name: Build ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: client/package-lock.json

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install Linux system dependencies
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libfuse2

      - name: Install client dependencies
        run: npm ci
        working-directory: client

      - name: Install Tauri CLI
        run: npm install -g @tauri-apps/cli@^2

      # Générer tous les formats d'icônes requis par Tauri
      # (32x32.png, 128x128.png, icon.ico, icon.icns, …) depuis icon-512.png
      - name: Generate Tauri icons
        run: tauri icon client/public/icon-512.png

      # Écrire le config override dans un fichier évite les problèmes
      # d'échappement JSON dans les arguments shell multi-plateformes.
      - name: Write Tauri config override
        shell: bash
        run: |
          printf '{"build":{"frontendDist":"%s"},"version":"%s"}' \
            "${{ inputs.server_url }}" \
            "${{ inputs.version }}" \
            > tauri-build-config.json
          cat tauri-build-config.json

      - name: Build Tauri
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: .
          tauriScript: tauri
          args: --bundles ${{ matrix.bundles }} --config tauri-build-config.json

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: webmail-${{ matrix.platform }}
          path: |
            src-tauri/target/release/bundle/deb/*.deb
            src-tauri/target/release/bundle/appimage/*.AppImage
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/bundle/nsis/*.exe
            src-tauri/target/release/bundle/dmg/*.dmg
          if-no-files-found: warn
          retention-days: 30
