name: Tauri Build

on:
  workflow_dispatch:
    inputs:
      server_url:
        description: "URL du serveur WebMail (baked dans l'app)"
        required: true
        default: "http://localhost:3000"
      version:
        description: "Version de l'app"
        required: false
        default: "1.6.0"

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            platform: linux
            targets: "--bundles deb,appimage"
          - os: windows-latest
            platform: windows
            targets: "--bundles msi,nsis"
          - os: macos-latest
            platform: macos
            targets: "--bundles dmg"

    runs-on: ${{ matrix.os }}
    name: Build ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: client/package-lock.json

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Install Linux system dependencies
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libfuse2

      - name: Install client dependencies
        run: npm ci
        working-directory: client

      - name: Build Tauri
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SERVER_URL: ${{ github.event.inputs.server_url }}
        with:
          projectPath: .
          tauriScript: npx tauri
          args: >
            ${{ matrix.targets }}
            --config '{"build":{"frontendDist":"${{ github.event.inputs.server_url }}"},"version":"${{ github.event.inputs.version }}"}'

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: webmail-${{ matrix.platform }}
          path: |
            src-tauri/target/release/bundle/deb/*.deb
            src-tauri/target/release/bundle/appimage/*.AppImage
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/bundle/nsis/*.exe
            src-tauri/target/release/bundle/dmg/*.dmg
          if-no-files-found: warn
          retention-days: 30
