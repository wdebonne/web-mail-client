version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ${STACK_NAME}-app
    restart: unless-stopped
    ports:
      - "${PORT:-3000}:${PORT:-3000}"
    environment:
      - NODE_ENV=${NODE_ENV:-production}
      - PORT=${PORT:-3000}
      - DATABASE_URL=${DATABASE_URL:-postgresql://webmail:${DB_PASSWORD:-webmail_secure_pwd}@db:5432/webmail}
      - SESSION_SECRET=${SESSION_SECRET:-change-me-in-production}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY:-change-me-32-chars-minimum-key!!}
      - JWT_SECRET=${JWT_SECRET:-}
      - WEBAUTHN_RP_ID=${WEBAUTHN_RP_ID:-localhost}
      - WEBAUTHN_RP_NAME=${WEBAUTHN_RP_NAME:-Web Mail}
      - WEBAUTHN_ORIGIN=${WEBAUTHN_ORIGIN:-http://localhost:5173}
      - DEFAULT_IMAP_PORT=${DEFAULT_IMAP_PORT:-993}
      - DEFAULT_SMTP_PORT=${DEFAULT_SMTP_PORT:-465}
      - APP_URL=${APP_URL:-}
      - VAPID_PUBLIC_KEY=${VAPID_PUBLIC_KEY:-}
      - VAPID_PRIVATE_KEY=${VAPID_PRIVATE_KEY:-}
      - VAPID_CONTACT=${VAPID_CONTACT:-}
      - NEW_MAIL_POLL_INTERVAL_MS=${NEW_MAIL_POLL_INTERVAL_MS:-60000}
      - TAURI_BUILDER_URL=${TAURI_BUILDER_URL:-http://tauri-builder:4000}
    volumes:
      - ./plugins:/app/plugins
      - ./uploads:/app/uploads
      - app_data:/app/data
      - tauri_downloads:/app/server/downloads
    depends_on:
      db:
        condition: service_healthy
    networks:
      - webmail-network
    labels:
      - "com.centurylinklabs.watchtower.enable=true"

  db:
    image: postgres:16-alpine
    container_name: ${STACK_NAME}-db
    restart: unless-stopped
    environment:
      - POSTGRES_DB=webmail
      - POSTGRES_USER=webmail
      - POSTGRES_PASSWORD=${DB_PASSWORD:-webmail_secure_pwd}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U webmail"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - webmail-network

  tauri-builder:
    build:
      context: .
      dockerfile: Dockerfile.tauri-builder
    container_name: ${STACK_NAME}-tauri-builder
    restart: unless-stopped
    volumes:
      - .:/project:ro
      - tauri_downloads:/downloads
    networks:
      - webmail-network
    profiles:
      - builder

volumes:
  postgres_data:
    name: ${STACK_NAME}_postgres_data
  app_data:
    name: ${STACK_NAME}_app_data
  tauri_downloads:
    name: ${STACK_NAME}_tauri_downloads

networks:
  webmail-network:
    name: ${STACK_NAME}-network
    driver: bridge
